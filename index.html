<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>akov.tech</title>
<meta name="description" content="akov.tech — личный сайт. Скоро здесь.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
<style>
  :root{
    --bg:#0b0f17; --bg2:#111827; --fg:#e5e7eb; --muted:#94a3b8; --accent:#6ee7ff; --accent2:#a78bfa;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; background:radial-gradient(1200px 600px at 50% -10%, #1b2540 0%, var(--bg) 60%) fixed;
    color:var(--fg); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Helvetica,Arial,sans-serif;
    display:flex; align-items:center; justify-content:center; min-height:100svh; padding:24px; text-align:center;
  }
  .card{max-width:640px; width:100%}
  .badge{
    display:inline-flex; align-items:center; gap:8px; font-size:13px; letter-spacing:.08em; text-transform:uppercase;
    color:var(--muted); border:1px solid rgba(148,163,184,.25); border-radius:999px; padding:6px 14px; margin-bottom:28px;
  }
  .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent);animation:pulse 1.8s infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.7)}}
  h1{
    margin:0; font-size:clamp(44px,12vw,96px); line-height:1; font-weight:800; letter-spacing:-.03em;
    background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .tld{color:var(--muted); -webkit-text-fill-color:var(--muted)}
  p.lead{margin:22px auto 0; max-width:460px; color:var(--muted); font-size:clamp(15px,2.6vw,18px); line-height:1.6}
  .foot{margin-top:40px; font-size:13px; color:rgba(148,163,184,.6)}
  a{color:var(--accent)}
</style>
</head>
<body>
  <main class="card">
    <span class="badge"><span class="dot"></span> coming soon</span>
    <h1>akov<span class="tld">.tech</span></h1>
    <p class="lead">Личный сайт скоро будет здесь. Идёт сборка.<br>Personal site — under construction.</p>
    <div class="foot">© <span id="y"></span> akov.tech</div>
  </main>
  <script>document.getElementById('y').textContent=new Date().getFullYear()</script>
</body>
</html>
